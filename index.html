<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TEZ KARGO Рулетка</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  font-family: Arial;
  text-align: center;
  color: white;
}

.container {
  margin-top: 50px;
  position: relative;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid #facc15;
  margin: 0 auto;
  z-index: 10;
}

#wheel {
  width: 320px;
  height: 320px;
  margin: -10px auto 20px;
  border-radius: 50%;
  border: 10px solid #fff;
  transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);

  background: conic-gradient(
    #ef4444 0deg 60deg,
    #22c55e 60deg 120deg,
    #3b82f6 120deg 180deg,
    #f97316 180deg 240deg,
    #a855f7 240deg 300deg,
    #eab308 300deg 360deg
  );
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  margin-top: 15px;
}

#result {
  margin-top: 20px;
  font-size: 22px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
  width: 200px;
}
</style>
</head>

<body>

<h2>🎰 TEZ KARGO Рулетка</h2>

<div class="container">
  <div class="pointer"></div>
  <div id="wheel"></div>
</div>

<!-- telegram id ввод -->
<input id="tgid" placeholder="Telegram ID">

<br>

<button onclick="spin()">Крутить</button>

<div id="result"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxT-7zGTiEFVjpJ9z8Lu5K1pmosYMhUGvcQOn3pLkBJBWvflLZ0DInDkn4X17DxPu8vGw/exec";

const rewards = [
  "😅 ПОПРОБУЙ В СЛЕДУЮЩИЙ РАЗ",
  "🎁 СКИДКА 5%",
  "✨ СКИДКА 7%",
  "🎉 СКИДКА 10%",
  "🔥 СКИДКА 12%",
  "💎 СКИДКА 15%"
];

let isSpinning = false;

function spin() {

  if (isSpinning) return;
  isSpinning = true;

  let telegram_id = document.getElementById("tgid").value;

  if (!telegram_id) {
    alert("Введите Telegram ID");
    isSpinning = false;
    return;
  }

  fetch(SCRIPT_URL + "?action=spin&telegram_id=" + telegram_id)
    .then(res => res.json())
    .then(data => {

      if (data.status !== "success") {
        document.getElementById("result").innerHTML =
          "⛔ " + data.message;
        isSpinning = false;
        return;
      }

      let index = data.rewardIndex;
      let reward = data.reward;

      spinWheel(index);

      setTimeout(() => {
        document.getElementById("result").innerHTML =
          "🎉 Вы выиграли: <b>" + reward + "</b>";

        isSpinning = false;
      }, 4200);

    })
    .catch(err => {
      console.log(err);
      isSpinning = false;
    });
}

function spinWheel(index) {

  const angle = 360 / rewards.length;
  const rotateTo = (360 * 6) + (index * angle);

  document.getElementById("wheel").style.transform =
    `rotate(${rotateTo}deg)`;
}

</script>

</body>
</html>
