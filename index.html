<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEZ KARGO Рулетка</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  text-align:center;
  color:white;
  overflow:hidden;
}

h1{
  margin-top:20px;
  color:#00f5ff;
  text-shadow:0 0 20px #00f5ff;
}

.container{
  position:relative;
  width:360px;
  height:360px;
  margin:40px auto;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  border:12px solid #00f5ff;
  box-shadow:0 0 35px #00f5ff;
  transition:transform 5s cubic-bezier(.2,.8,.2,1);
}

.sector{
  position:absolute;
  width:50%;
  height:50%;
  top:50%;
  left:50%;
  transform-origin:0% 0%;
  clip-path:polygon(0 0,100% 0,100% 100%);
}

.sector span{
  position:absolute;
  left:18px;
  top:30px;
  font-size:12px;
  font-weight:bold;
}

.pointer{
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  color:#ff00ff;
  z-index:20;
}

.center-logo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  background:white;
  z-index:10;
  overflow:hidden;
}

.center-logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

button{
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00f5ff,#ff00ff);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.popup{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(45deg,#00f5ff,#ff00ff);
  padding:25px 40px;
  border-radius:18px;
  font-size:22px;
  font-weight:bold;
  transition:.3s;
}
</style>
</head>

<body>

<h1>🎯 TEZ KARGO РУЛЕТКА</h1>

<div class="container">
  <div class="pointer">▼</div>
  <div class="wheel" id="wheel"></div>

  <div class="center-logo">
    <img src="logo.jpg">
  </div>
</div>

<button onclick="spin()">🎲 КРУТИТЬ</button>

<div class="popup" id="popup"></div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

/* Для теста */
let clientCode = "T0265";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCuqi_t3JRCZNns8aTWnM1GCvyNXk-F1Wzgd9nBAWvvXP5_sjRMz-exxVGzjm1KYiOPw/exec";

const rewards = [
  "🎁 СКИДКА 5%",
  "🎉 СКИДКА 10%",
  "🔥 СКИДКА 12%",
  "💎 СКИДКА 15%",
  "😅 ПОПРОБУЙ СНОВА"
];

const colors = [
  "#ff00ff",
  "#00f5ff",
  "#22c55e",
  "#facc15",
  "#ef4444"
];

let wheel=document.getElementById("wheel");
let rotation=0;

/* создание колеса */
function createWheel(){
  let angle=360/rewards.length;

  rewards.forEach((text,i)=>{
    let sector=document.createElement("div");
    sector.className="sector";
    sector.style.background=colors[i];
    sector.style.transform=`rotate(${i*angle}deg) skewY(${90-angle}deg)`;

    let label=document.createElement("span");
    label.innerText=text;

    sector.appendChild(label);
    wheel.appendChild(sector);
  });
}

createWheel();

/* spin */
async function spin(){

  try{

    const response = await fetch(
      `${SCRIPT_URL}?action=spin&clientCode=${clientCode}`
    );

    const data = await response.json();

    if(data.status==="success"){

      let index=rewards.indexOf(data.reward);
      let angle=360/rewards.length;

      rotation += 360*6 + (360-(index*angle+angle/2));

      wheel.style.transform=`rotate(${rotation}deg)`;

      setTimeout(()=>{
        showWin(data.reward);
      },5000);

    }
    else if(data.status==="blocked"){
      alert("⏳ Уже крутил сегодня!");
    }
    else{
      alert("❌ "+data.message);
    }

  }catch(err){
    console.log(err);
    alert("❌ Ошибка сети");
  }
}

/* popup */
function showWin(text){
  let popup=document.getElementById("popup");

  popup.innerHTML="🎉 "+text;
  popup.style.transform="translate(-50%,-50%) scale(1)";

  setTimeout(()=>{
    popup.style.transform="translate(-50%,-50%) scale(0)";
  },2500);
}
</script>

</body>
</html>
