<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра на удачу</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#0f172a,#020617);
  text-align:center;
  color:white;
  overflow:hidden;
}

h1{
  margin-top:20px;
  color:#00f5ff;
  text-shadow:0 0 20px #00f5ff,0 0 40px #00f5ff;
}

.container{
  position:relative;
  width:380px;
  height:380px;
  margin:40px auto;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  border:14px solid #00f5ff;
  box-shadow:0 0 40px #00f5ff,inset 0 0 30px black;
  transition:transform 5s cubic-bezier(0.2,0.8,0.2,1);
}

.sector{
  position:absolute;
  width:50%;
  height:50%;
  top:50%;
  left:50%;
  transform-origin:0% 0%;
  clip-path:polygon(0 0,100% 0,100% 100%);
}

.sector span{
  position:absolute;
  left:18px;
  top:28px;
  font-size:12px;
  font-weight:bold;
  color:white;
}

.pointer{
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  color:#ff00ff;
}

button{
  padding:12px 25px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f5ff,#ff00ff);
  color:black;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #00f5ff;
}

.popup{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(45deg,#00f5ff,#ff00ff);
  padding:25px 40px;
  border-radius:20px;
  font-size:22px;
  color:black;
  font-weight:bold;
  box-shadow:0 0 60px #00f5ff;
  transition:0.3s;
  z-index:999;
}
</style>
</head>

<body>

<h1>🎯 ИГРА НА УДАЧУ</h1>

<div class="container">
  <div class="pointer">▼</div>
  <div class="wheel" id="wheel"></div>
</div>

<button onclick="spin()">🎲 КРУТИТЬ</button>

<div class="popup" id="popup"></div>

<script>

/* 🔥 Telegram WebApp */
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let clientCode = "TK" + user.id;

/* 🎁 призы */
const rewards = [
  "5% СКИДКА 🎁",
  "10% СКИДКА 🎉",
  "15% СКИДКА 🎉",
  "🚚 БЕСПЛАТНАЯ ДОСТАВКА ПВЗ → ДОМ (от 5 кг)",
  "1 КГ БЕСПЛАТНО 🎁",
  "ПОПРОБУЙ СНОВА 😅"
];

const colors = ["#ff00ff","#00f5ff","#22c55e","#facc15","#ef4444","#8b5cf6"];

let wheel = document.getElementById("wheel");
let rotation = 0;

/* создание колеса */
function createWheel(){
  let angle = 360 / rewards.length;

  rewards.forEach((text,i)=>{
    let sector = document.createElement("div");
    sector.className="sector";
    sector.style.background = colors[i];
    sector.style.transform = `rotate(${i*angle}deg) skewY(${90-angle}deg)`;

    let label = document.createElement("span");
    label.innerText = text;

    sector.appendChild(label);
    wheel.appendChild(sector);
  });
}

createWheel();

/* 🎯 SPIN */
function spin(){

  fetch("https://script.google.com/macros/s/AKfycbw_5YpfdA9IdR0MFsylay8JoXd0W6y_2yhASoHQvChNBqgQ_F0fh5yokbz_Q3YbGtgvhQ/exec?action=spin&clientCode=" + clientCode)

  .then(res => res.json())
  .then(data => {

    if(data.status === "success"){

      let index = rewards.indexOf(data.reward);
      let angle = 360 / rewards.length;

      rotation += 360*6 + (360 - (index*angle + angle/2));
      wheel.style.transform = `rotate(${rotation}deg)`;

      setTimeout(()=>{
        showWin(data.reward);
      },5000);

    } else if(data.status === "blocked") {
      alert("⏳ Уже крутил сегодня!");
    } else {
      alert("❌ Ошибка клиента");
    }

  });

}

/* popup */
function showWin(text){

  let popup=document.getElementById("popup");

  popup.innerHTML="🎉 "+text;
  popup.style.transform="translate(-50%,-50%) scale(1)";

  setTimeout(()=>{
    popup.style.transform="translate(-50%,-50%) scale(0)";
  },2500);
}

</script>

</body>
</html>
