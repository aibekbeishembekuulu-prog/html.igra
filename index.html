<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  text-align:center;
  color:white;
  overflow:hidden;
}

h1{
  margin-top:20px;
  color:#00f5ff;
  text-shadow:0 0 20px #00f5ff;
}

.container{
  position:relative;
  width:360px;
  height:360px;
  margin:40px auto;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  border:12px solid #00f5ff;
  box-shadow:0 0 35px #00f5ff;
  transition:transform 5s cubic-bezier(.2,.8,.2,1);
}

.sector{
  position:absolute;
  width:50%;
  height:50%;
  top:50%;
  left:50%;
  transform-origin:0% 0%;
  clip-path:polygon(0 0,100% 0,100% 100%);
}

.pointer{
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  color:#ff00ff;
  z-index:20;
}

.center-logo{
  position:absolute;
  top:50%;
